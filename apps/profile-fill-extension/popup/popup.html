<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile Fill Assistant</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <p class="eyebrow">Profile Fill</p>
          <h1>Autofill applications</h1>
        </div>
        <span class="badge">MV3</span>
      </header>

      <section class="actions">
        <button id="fill-page" class="primary" type="button">Fill current page</button>
        <button id="save-profile" class="secondary" type="button">Save profile</button>
      </section>

      <p id="status" class="status" role="status">Profile is stored only in Chrome extension storage.</p>

      <form id="profile-form" class="form">
        <label>
          Full name
          <input name="fullName" autocomplete="name" placeholder="Your name" />
        </label>
        <label>
          Email
          <input name="email" type="email" autocomplete="email" placeholder="you@example.com" />
        </label>
        <label>
          Phone
          <input name="phone" autocomplete="tel" placeholder="+91..." />
        </label>
        <label>
          Location
          <input name="location" autocomplete="address-level2" placeholder="City, Country" />
        </label>
        <label>
          Current title
          <input name="currentTitle" placeholder="Software Engineer" />
        </label>
        <label>
          Current company
          <input name="company" placeholder="Company name" />
        </label>
        <label>
          LinkedIn
          <input name="linkedin" placeholder="https://linkedin.com/in/..." />
        </label>
        <label>
          GitHub
          <input name="github" placeholder="https://github.com/..." />
        </label>
        <label>
          Portfolio
          <input name="portfolio" placeholder="https://..." />
        </label>
        <label>
          Resume URL
          <input name="resumeUrl" placeholder="https://..." />
        </label>
        <div class="split">
          <label>
            Experience
            <input name="years" placeholder="5" />
          </label>
          <label>
            Notice
            <input name="notice" placeholder="Immediate" />
          </label>
        </div>
        <label>
          Work authorization
          <input name="workAuth" placeholder="Authorized to work in..." />
        </label>
        <label>
          Salary expectation
          <input name="salary" placeholder="Negotiable" />
        </label>
        <label>
          Short summary
          <textarea name="summary" rows="4" placeholder="Brief professional summary"></textarea>
        </label>
      </form>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
